<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Flixz – Detailing Estimate</title>

<style>
body {
    background:#0b0b0b;
    font-family: Arial, sans-serif;
    color:#eee;
    padding:20px;
}

.container {
    max-width:520px;
    margin:auto;
    background:#141414;
    padding:30px 25px;
    border-radius:14px;
    box-shadow: 0 20px 45px rgba(0,0,0,.7);
}

.logo {
    text-align:center;
    margin-bottom:15px;
}

.logo img {
    max-width:160px;
    height:auto;
}

h2 {
    text-align:center;
    margin:10px 0 5px;
    font-size:22px;
    letter-spacing:1px;
}

.sub {
    text-align:center;
    font-size:12px;
    color:#aaa;
    margin-bottom:25px;
}

label {
    display:block;
    margin-top:15px;
    font-size:14px;
    color:#ccc;
}

select, input {
    width:100%;
    padding:11px;
    background:#242424;
    border:1px solid #333;
    border-radius:7px;
    color:#fff;
    font-size:14px;
}

select:focus, input:focus {
    outline:none;
    border-color:#fff;
}

.checkbox {
    margin-top:18px;
    display:flex;
    align-items:center;
    gap:10px;
    font-size:14px;
}

button {
    width:100%;
    margin-top:28px;
    padding:15px;
    background:#fff;
    color:#000;
    border:none;
    border-radius:10px;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
}

button:hover {
    opacity:.9;
}

.breakdown {
  margin-top:25px;
  background:#0b0b0b;
  padding:25px;
  border-radius:12px;
  border:2px solid #9cd5fc;
  font-size:18px;
  line-height:1.6;
}

.breakdown strong {
  font-size:22px;
  display:block;
  margin-bottom:12px;
}

.breakdown .line {
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}

.breakdown hr {
  margin:15px 0;
  border:1px solid #333;
}

.breakdown .total {
  font-size:26px;
  color:#9cd5fc;
  font-weight:bold;
  text-align:center;
}

.note {
    font-size:11px;
    color:#888;
    text-align:center;
    margin-top:12px;
}
</style>
</head>

<body>

<div class="container">

    <h2>Detailing Price Estimate</h2>
    <div class="sub">Mobile Auto Detailing • Quick Estimate</div>

    <label>Year</label>
    <select id="year"></select>

    <label>Brand</label>
    <select id="brand"></select>

    <label>Model</label>
    <select id="model"></select>

    <label>Vehicle Condition</label>
    <select id="condition">
        <option value="">Select condition</option>
        <option value="light">Light Cleaning</option>
        <option value="moderate">Moderate</option>
        <option value="dirty">Dirty</option>
        <option value="nasty">Nasty</option>
    </select>

    <label>Service Type</label>
    <select id="service">
        <option value="">Select service</option>
        <option value="exterior">Exterior Only</option>
        <option value="interior">Interior Only</option>
        <option value="both">Interior + Exterior</option>
    </select>

    <div class="checkbox">
        <input type="checkbox" id="coating">
        <label for="coating">Add Wax / Ceramic Coating</label>
    </div>
<div class="checkbox">
    <input type="checkbox" id="firstTime" autocomplete="off">
    <label for="firstTime">First-Time Customer (15% Off)</label>
</div>
    <button onclick="estimate()">Get Estimate</button>

    <div class="breakdown" id="breakdown"></div>
    <div class="note">Final pricing subject to in-person inspection</div>

</div>

<script>

const yearSel = document.getElementById("year");
for(let y=2026; y>=1900; y--) yearSel.add(new Option(y,y));

const cars = {
  Ford:["F-150","Super Duty F-250","Super Duty F-350","Ranger","Maverick","Mustang","Mustang Mach-E","Explorer","Expedition","Escape","Bronco","Bronco Sport","Edge"],
  Chevrolet:["Silverado 1500","Silverado HD","Colorado","Tahoe","Suburban","Traverse","Equinox","Blazer","Trailblazer","Corvette","Camaro","Malibu"],
  Dodge:["Charger","Challenger","Durango","Hornet"],
  RAM:["1500","2500","3500","ProMaster"],
  Cadillac:["Escalade","T4","XT5","XT6","CT4","CT5","CT6","Blackwing","Lyriq","Celestiq","ATS","CTS","SRX","STS","XTS"],
  GMC:["Sierra","Canyon","Yukon","Terrain","Acadia","Hummer EV"],
  Tesla:["Model S","Model 3","Model X","Model Y","Cybertruck"],
  Toyota:["Corolla","Camry","Prius","GR86","Supra","Tacoma","Tundra","4Runner","RAV4","Highlander","Sequoia","Crown","Land Cruiser"],
  Honda:["Civic","Accord","CR-V","HR-V","Pilot","Passport","Ridgeline"],
  Nissan:["Altima","Sentra","Versa","Maxima","Rogue","Pathfinder","Frontier","Titan","Z","GT-R"],
  Subaru:["WRX","BRZ","Crosstrek","Forester","Outback","Ascent","Impreza"],
  Mazda:["Mazda3","Mazda6","CX-30","CX-5","CX-50","CX-90","MX-5 Miata"],
  BMW:["2 Series","3 Series","4 Series","5 Series","7 Series","8 Series","X1","X2","X3","X4","X5","X6","X7","Z4","i4","i7","XM"],
  "Mercedes-Benz":["A-Class","C-Class","E-Class","S-Class","CLA","GLA","GLB","GLC","GLE","GLS","G-Wagon","EQS","EQE"],
  Audi:["A3","A4","A5","A6","A7","A8","Q3","Q4","Q5","Q7","Q8","e-tron GT","R8"],
  Porsche:["718 Cayman","718 Boxster","911","Panamera","Macan","Cayenne","Taycan"],
  Hyundai:["Elantra","Sonata","Tucson","Santa Fe","Palisade","Kona","Ioniq 5","Ioniq 6"],
  Kia:["Forte","K5","Soul","Sportage","Sorento","Telluride","EV6"],
  Ferrari:["296 GTB","SF90","Roma","Purosangue"],
  Lamborghini:["Huracán","Revuelto","Urus"],
  Jaguar:["F-Pace","I-Pace","F-Type"],
  "Land Rover":["Defender","Discovery","Range Rover","Range Rover Sport","Range Rover Velar"],
  Volvo:["S60","S90","XC40","XC60","XC90","EX30"],
};

const brandSel = document.getElementById("brand");
brandSel.add(new Option("Select brand",""));
Object.keys(cars).forEach(b=>brandSel.add(new Option(b,b)));

brandSel.onchange = ()=>{
    const modelSel=document.getElementById("model");
    modelSel.innerHTML="";
    modelSel.add(new Option("Select model",""));
    cars[brandSel.value]?.forEach(m=>modelSel.add(new Option(m,m)));
};

function estimate() {
    const year = yearSel.value;
    const brand = brandSel.value;
    const model = document.getElementById("model").value;
    const condition = document.getElementById("condition").value;
    const service = document.getElementById("service").value;
    const coating = document.getElementById("coating").checked;
    const firstTime = document.getElementById("firstTime").checked;

    if(!year||!brand||!model||!condition||!service){
        document.getElementById("breakdown").innerHTML="Please complete all fields.";
        return;
    }

    // Improved large vehicle detection
    const largeVehicles = ["F-150","2500","3500","Tahoe","Suburban","Expedition","Yukon","Escalade","X5","X7","Model X","Land Cruiser"];
    let sizeMultiplier = largeVehicles.some(v => model.includes(v)) ? 1.3 : 1;

    const conditionFactor = { light:1, moderate:1.3, dirty:1.6, nasty:2 }[condition];

    let interior = 0, exterior = 0, chemicals = 15;

    if(service==="exterior") exterior = 40 * conditionFactor;
    if(service==="interior") { interior = 90 * conditionFactor; chemicals += 20; }
    if(service==="both") { interior = 90 * conditionFactor; exterior = 30 * conditionFactor; chemicals += 30; }

    interior *= sizeMultiplier;
    exterior *= sizeMultiplier;

    const coatingCost = coating ? (sizeMultiplier > 1 ? 120 : 80) : 0;

    const water = 10, mobile = 25;
    let subtotal = Math.round(interior + exterior + chemicals + coatingCost + water + mobile);

    let discount = 0;
    if(firstTime){
        discount = Math.round(subtotal * 0.15);
        subtotal -= discount;
    }

    const tax = Math.round(subtotal * 0.06);
    const total = subtotal + tax;

    document.getElementById("breakdown").innerHTML = `
<strong>${year} ${brand} ${model}</strong>
<div class="line"><span>Interior</span><span>$${Math.round(interior)}</span></div>
<div class="line"><span>Exterior</span><span>$${Math.round(exterior)}</span></div>
<div class="line"><span>Chemicals</span><span>$${chemicals}</span></div>
<div class="line"><span>Wax / Ceramic</span><span>$${coatingCost}</span></div>
<div class="line"><span>Water</span><span>$${water}</span></div>
<div class="line"><span>Mobile Service</span><span>$${mobile}</span></div>
${discount > 0 ? `<div class="line"><span>First-Time Discount</span><span>-$${discount}</span></div>` : ``}
<div class="line"><span>Tax (6%)</span><span>$${tax}</span></div>
<hr>
<div class="total">Estimated Total: $${total}</div>
`;
}

</script>

</body>
</html>
